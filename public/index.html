<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Help Me Name My New Puppy!</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="board">
    <header class="board-header">
      <h1>🐾 Name me! 🐾</h1>
      <p class="blurb">
        This is a very cute puppy. She needs a name!
      </p>
      <img class="photo" src="puppy.jpg" alt="Our new puppy" />
    </header>

    <section class="card">
      <h2>🏆 Leaderboard</h2>
      <p id="leaderboard-error" class="error-msg" hidden></p>
      <ol id="leaderboard" class="leaderboard"></ol>
    </section>

    <section id="verify-panel" class="card" hidden>
      <h2>📱 Verify Your Phone to Vote</h2>
      <p>Voting for <strong id="verify-name"></strong>. We'll text you a one-time code to confirm your vote.</p>

      <form id="phone-form">
        <label for="phone-input">Phone number</label>
        <input
          id="phone-input"
          name="phoneNumber"
          type="tel"
          placeholder="+15555550123"
          required
        />
        <button type="submit">Send Code</button>
      </form>

      <form id="code-form" hidden>
        <label for="code-input">Verification code</label>
        <input
          id="code-input"
          name="code"
          type="text"
          inputmode="numeric"
          placeholder="123456"
          required
        />
        <button type="submit">Confirm Vote</button>
      </form>

      <p id="verify-error" class="error-msg" hidden></p>
      <button id="verify-cancel" class="link-btn" type="button">Cancel</button>
    </section>

    <footer class="board-footer">
      <p>Made with 🐾 by a very tired new puppy owner. Adopted from 
        <a href="https://cghs.org/donate/" target="_blank" rel="noopener noreferrer">CGHS</a>.
      </p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
