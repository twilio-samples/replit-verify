<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Help Me Name My New Puppy!</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="board">
    <header class="board-header">
      <h1>🐾 Name me! 🐾</h1>
      <p class="blurb">
        This is a very cute puppy. She needs a name!
      </p>
      <img class="photo" src="puppy.jpg" alt="Our new puppy" />
    </header>

    <section class="card">
      <h2>🏆 Leaderboard</h2>
      <p id="leaderboard-error" class="error-msg" hidden></p>
      <ol id="leaderboard" class="leaderboard"></ol>
    </section>

    <section class="card">
      <h2>✍️ Suggest a Name</h2>
      <form id="submit-form">
        <label for="name-input">Name</label>
        <input
          id="name-input"
          name="name"
          type="text"
          maxlength="40"
          placeholder="e.g. Biscuit"
          required
        />

        <button type="submit">Submit Name 🐾</button>
        <p id="form-error" class="error-msg" hidden></p>
      </form>
    </section>

    <footer class="board-footer">
      <p>Made with 🐾 by a very tired new puppy owner. Adopted from 
        <a href="https://cghs.org/donate/" target="_blank" rel="noopener noreferrer">CGHS</a>.
      </p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
